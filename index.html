<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant 24/7</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #202123; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; line-height: 1.4; font-size: 15px; }
        .user { background: #007aff; color: white; align-self: flex-end; }
        .ai { background: #ffffff; color: #333; align-self: flex-start; border: 1px solid #ddd; }
        .controls { background: white; padding: 20px; border-top: 1px solid #ddd; display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { background: #007aff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #file-info { font-size: 12px; color: #666; }
    </style>
</head>
<body>

<header>Qwen 2.5 Coder 24/7</header>

<div id="chat-box">
    <div class="msg ai">Hello! Send me a message or upload a file (code, text, or PDF) to get started.</div>
</div>

<div class="controls">
    <div id="file-info">No file selected</div>
    <div class="input-row">
        <input type="file" id="fileInput" style="display:none" onchange="updateFileName()">
        <button onclick="document.getElementById('fileInput').click()" style="background:#34c759">📎</button>
        <input type="text" id="userInput" placeholder="Ask something...">
        <button id="sendBtn" onclick="sendToAI()">Send</button>
    </div>
</div>

<script>
    // YOUR LIVE HUGGING FACE URL
    const API_URL = "https://k2ind-0pen.hf.space/generate";

    function updateFileName() {
        const file = document.getElementById('fileInput').files[0];
        document.getElementById('file-info').textContent = file ? `Selected: ${file.name}` : "No file selected";
    }

    async function sendToAI() {
        const input = document.getElementById('userInput');
        const fileInput = document.getElementById('fileInput');
        const chatBox = document.getElementById('chat-box');
        const sendBtn = document.getElementById('sendBtn');
        const text = input.value.trim();

        if (!text && !fileInput.files[0]) return;

        // Add User Message
        const userMsg = document.createElement('div');
        userMsg.className = 'msg user';
        userMsg.textContent = text || "Uploaded a file";
        chatBox.appendChild(userMsg);

        // Clear and Disable
        input.value = "";
        sendBtn.disabled = true;
        chatBox.scrollTop = chatBox.scrollHeight;

        // Add AI Thinking Placeholder
        const aiMsg = document.createElement('div');
        aiMsg.className = 'msg ai';
        aiMsg.textContent = "...";
        chatBox.appendChild(aiMsg);

        // Prepare FormData
        const formData = new FormData();
        formData.append("prompt", text || "What is in this file?");
        if (fileInput.files[0]) {
            formData.append("file", fileInput.files[0]);
        }

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                body: formData
            });

            const data = await response.json();
            aiMsg.textContent = data.response || "Error: Could not get a response.";
        } catch (error) {
            aiMsg.textContent = "Error: API is offline or unreachable.";
        } finally {
            sendBtn.disabled = false;
            fileInput.value = "";
            updateFileName();
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    // Enter key support
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendToAI();
    });
</script>

</body>
</html>
